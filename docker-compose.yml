services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rmuti-surin-loan-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ระบบบริหารลูกหนี้เงินยืม RMUTI Surin}
    container_name: rmuti-surin-loan-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ระบบบริหารลูกหนี้เงินยืม RMUTI Surin}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    container_name: rmuti-surin-loan-mysql
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: rmuti_surin_loan
      MYSQL_USER: loan_user
      MYSQL_PASSWORD: loan_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
